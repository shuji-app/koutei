<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="エアコン点検">
  <meta name="theme-color" content="#1B3A6B">
  <title>エアコン点検システム</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-512.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root {
      height: 100%; height: -webkit-fill-available;
      overflow: hidden; -webkit-text-size-adjust: 100%;
    }
    body {
      background: #1B3A6B;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    #root { background: #F1F5F9; }
    #loading {
      position: fixed; inset: 0; background: #1B3A6B;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 99999; transition: opacity 0.4s;
    }
    #loading.hide { opacity: 0; pointer-events: none; }
    #loading .icon { font-size: 52px; }
    #loading .title { color:#fff; font-size:20px; font-weight:800; letter-spacing:0.04em; font-family:'Hiragino Sans',sans-serif; }
    #loading .sub   { color:rgba(255,255,255,0.6); font-size:13px; font-family:'Hiragino Sans',sans-serif; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="icon">🌡️</div>
    <div class="title">エアコン点検システム</div>
    <div class="sub">読み込み中...</div>
  </div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="./app.js"></script>
  <script>
    window.addEventListener('load', () => {
      const tryMount = (n) => {
        if (window.__AC_APP__) {
          ReactDOM.createRoot(document.getElementById('root'))
            .render(React.createElement(window.__AC_APP__));
          document.getElementById('loading').classList.add('hide');
        } else if (n > 0) {
          setTimeout(() => tryMount(n - 1), 100);
        }
      };
      tryMount(30);
    });
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
      });
    }
  </script>
</body>
</html>
